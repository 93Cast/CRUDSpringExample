<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Productos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-10">

<div class="max-w-4xl mx-auto bg-white shadow-lg rounded-lg p-6">

    <h1 class="text-2xl font-bold mb-4">Lista de Productos</h1>

    <a href="/productos/nuevo"
       class="bg-blue-500 text-white px-4 py-2 rounded">
        Nuevo Producto
    </a>

    <table class="w-full mt-4 border">
        <thead class="bg-gray-200">
        <tr>
            <th class="p-2">Nombre</th>
            <th class="p-2">Precio</th>
            <th class="p-2">Stock</th>
            <th class="p-2">Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${productos}" class="border-t">
            <td class="p-2" th:text="${p.nombre}"></td>
            <td class="p-2" th:text="${p.precio}"></td>
            <td class="p-2" th:text="${p.stock}"></td>
            <td class="p-2">
                <a th:href="@{/productos/editar/{id}(id=${p.id})}"
                   class="text-yellow-500">Editar</a>
                |
                <a th:href="@{/productos/eliminar/{id}(id=${p.id})}"
                   class="text-red-500">Eliminar</a>
            </td>
        </tr>
        </tbody>
    </table>

</div>
</body>
</html>
